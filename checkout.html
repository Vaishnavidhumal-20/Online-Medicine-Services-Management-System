{% extends "base.html" %}

{% block content %}
<div class="container py-5">
    <div class="row g-4">
        <div class="col-lg-7">
            <div class="glass-card p-4 shadow-sm border-0 mb-4">
                <h4 class="fw-bold mb-4">Delivery Information</h4>
                <form id="checkout-form" method="POST">
                    <div class="row g-3">
                        <div class="col-md-12">
                            <label class="form-label">Full Name</label>
                            <input type="text" name="full_name" class="form-control rounded-pill px-3" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Phone Number</label>
                            <input type="text" name="phone" class="form-control rounded-pill px-3" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">City</label>
                            <input type="text" name="city" class="form-control rounded-pill px-3" required>
                        </div>
                        <div class="col-md-12">
                            <label class="form-label">Address</label>
                            <textarea name="address" class="form-control rounded-4 px-3" rows="3" required></textarea>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">State</label>
                            <input type="text" name="state" class="form-control rounded-pill px-3" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Zip Code</label>
                            <input type="text" name="zip_code" class="form-control rounded-pill px-3" required>
                        </div>
                    </div>

                    <h4 class="fw-bold mt-5 mb-4">Payment Method</h4>
                    <div class="payment-options d-flex flex-column gap-3 mb-4">
                        <div class="form-check p-3 border rounded-4">
                            <input class="form-check-input ms-0 me-2" type="radio" name="payment_method" value="UPI"
                                id="upi" onchange="togglePaymentFields('upi')">
                            <label class="form-check-label fw-bold d-flex justify-content-between w-100" for="upi">
                                <span>UPI (GPay / PhonePe / Paytm)</span>
                                <i class="fas fa-qrcode text-success"></i>
                            </label>
                            <div id="upi-sub-options" class="mt-3 d-none animate__animated animate__fadeIn">
                                <div class="d-flex flex-wrap gap-2">
                                    <button type="button" onclick="redirectToPay('gpay')"
                                        class="btn btn-outline-primary btn-sm rounded-pill px-3 shadow-none">
                                        <i class="fab fa-google-pay me-1"></i> GPay
                                    </button>
                                    <button type="button" onclick="redirectToPay('phonepe')"
                                        class="btn btn-outline-primary btn-sm rounded-pill px-3 shadow-none">
                                        <i class="fas fa-mobile-alt me-1"></i> PhonePe
                                    </button>
                                    <button type="button" onclick="redirectToPay('paytm')"
                                        class="btn btn-outline-primary btn-sm rounded-pill px-3 shadow-none">
                                        <i class="fas fa-wallet me-1"></i> Paytm
                                    </button>
                                </div>
                                <p class="small text-muted mt-2 mb-0 italic">Clicking will open the official payment
                                    site/app.</p>
                            </div>
                        </div>
                        <div class="form-check p-3 border rounded-4">
                            <input class="form-check-input ms-0 me-2" type="radio" name="payment_method" value="Card"
                                id="card" onchange="togglePaymentFields('card')">
                            <label class="form-check-label fw-bold d-flex justify-content-between w-100" for="card">
                                <span>Debit / Credit Card</span>
                                <div><i class="fab fa-cc-visa text-primary"></i> <i
                                        class="fab fa-cc-mastercard text-danger"></i></div>
                            </label>
                            <div id="card-fields" class="mt-3 d-none animate__animated animate__fadeIn">
                                <div class="row g-2">
                                    <div class="col-12">
                                        <input type="text" class="form-control rounded-pill px-3"
                                            placeholder="Card Number">
                                    </div>
                                    <div class="col-6">
                                        <input type="text" class="form-control rounded-pill px-3" placeholder="MM/YY">
                                    </div>
                                    <div class="col-6">
                                        <input type="text" class="form-control rounded-pill px-3" placeholder="CVV">
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="form-check p-3 border rounded-4">
                            <input class="form-check-input ms-0 me-2" type="radio" name="payment_method" value="COD"
                                id="cod" checked onchange="togglePaymentFields('cod')">
                            <label class="form-check-label fw-bold d-flex justify-content-between w-100" for="cod">
                                <span>Cash On Delivery</span>
                                <i class="fas fa-truck text-secondary"></i>
                            </label>
                        </div>
                    </div>

                    <script>
                        function togglePaymentFields(method) {
                            document.getElementById('upi-sub-options').classList.add('d-none');
                            document.getElementById('card-fields').classList.add('d-none');
                            if (method === 'upi') {
                                document.getElementById('upi-sub-options').classList.remove('d-none');
                            } else if (method === 'card') {
                                document.getElementById('card-fields').classList.remove('d-none');
                            }
                        }

                        function redirectToPay(method) {
                            let url = '';
                            if (method === 'gpay') url = 'https://pay.google.com/';
                            else if (method === 'phonepe') url = 'https://www.phonepe.com/';
                            else if (method === 'paytm') url = 'https://paytm.com/';

                            if (url) {
                                window.open(url, '_blank');
                            }
                        }
                    </script>

                    <button type="submit" class="btn btn-success w-100 rounded-pill py-3 fw-bold shadow-sm">
                        Confirm and Pay ₹{{ total }}
                    </button>
                </form>
            </div>
        </div>

        <div class="col-lg-5">
            <div class="glass-card p-4 shadow-sm border-0">
                <h5 class="fw-bold mb-4">Your Order</h5>
                <!-- Order summary list can go here -->
                <div class="d-flex justify-content-between mb-3 fs-5 fw-bold text-success border-top pt-3">
                    <span>Amount Payable</span>
                    <span>₹{{ total }}</span>
                </div>
                <div class="alert alert-info border-0 rounded-4 small">
                    <i class="fas fa-info-circle me-2"></i> Your medicine will be delivered within 24-48 hours.
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
