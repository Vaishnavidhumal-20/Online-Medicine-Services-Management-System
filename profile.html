{% extends "base.html" %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card border-0 shadow-lg rounded-4 overflow-hidden">
                <div class="card-header bg-success text-white py-4 text-center">
                    <h3 class="fw-bold mb-0">Profile Settings</h3>
                    <p class="small mb-0 opacity-75">Update your personal information and credentials</p>
                </div>
                <div class="card-body p-5">
                    <form action="{{ url_for('user.profile') }}" method="POST">
                        <div class="mb-4">
                            <label class="form-label fw-bold small">Username</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light border-0"><i class="fas fa-user text-success"></i></span>
                                <input type="text" name="username" class="form-control border-0 bg-light" value="{{ current_user.username }}" required>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-bold small">Email Address</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light border-0"><i class="fas fa-envelope text-success"></i></span>
                                <input type="email" name="email" class="form-control border-0 bg-light" value="{{ current_user.email or '' }}" placeholder="Enter your email">
                            </div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-bold small">Phone Number</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light border-0"><i class="fas fa-phone text-success"></i></span>
                                <input type="text" name="phone_number" class="form-control border-0 bg-light" value="{{ current_user.phone_number or '' }}" placeholder="Enter phone number">
                            </div>
                        </div>

                        <div class="mb-5">
                            <label class="form-label fw-bold small">New Password (Ignore to keep existing)</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light border-0"><i class="fas fa-lock text-success"></i></span>
                                <input type="password" name="new_password" class="form-control border-0 bg-light" placeholder="Min 6 characters">
                            </div>
                        </div>

                        <div class="d-grid gap-3">
                            <button type="submit" class="btn btn-success btn-lg rounded-pill fw-bold shadow-sm">Save Changes</button>
                            <a href="{{ url_for('user.dashboard') }}" class="btn btn-light btn-lg rounded-pill fw-bold text-secondary">Back to Dashboard</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
