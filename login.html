{% extends "base.html" %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-5" data-aos="zoom-in">
            <div class="glass-card p-5 shadow-lg border-0">
                <div class="text-center mb-4">
                    <i class="fas fa-plus-medical text-success fs-1 mb-3"></i>
                    <h2 class="fw-bold">{{ request.args.get('role', 'User')|capitalize }} Login</h2>
                    <p class="text-secondary">Welcome back to PharmaPlus</p>
                </div>

                <form method="POST">
                    <input type="hidden" name="role" value="{{ request.args.get('role', 'user') }}">
                    <div class="mb-4">
                        <label class="form-label fw-medium">Email / Username / Phone</label>
                        <div class="input-group">
                            <span class="input-group-text bg-white border-end-0 rounded-start-pill px-3">
                                <i class="fas fa-user text-success"></i>
                            </span>
                            <input type="text" name="email" class="form-control border-start-0 rounded-end-pill py-2"
                                placeholder="Enter Email, Username or Phone" required>
                        </div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-medium">Password</label>
                        <div class="input-group">
                            <span class="input-group-text bg-white border-end-0 rounded-start-pill px-3">
                                <i class="fas fa-lock text-success"></i>
                            </span>
                            <input type="password" name="password"
                                class="form-control border-start-0 rounded-end-pill py-2" placeholder="Enter Password"
                                required>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-success w-100 rounded-pill py-2 fw-bold shadow-sm">
                        Login as {{ request.args.get('role', 'User')|capitalize }}
                    </button>
                </form>

                <div class="text-center mt-4">
                    <p class="text-secondary small">Don't have an account? <a href="{{ url_for('auth.register') }}"
                            class="text-success fw-bold text-decoration-none">Register here</a></p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
